          payload: { oldUrl: oldUrlForMessage, newUrl: newUrl },
        },
        PARENT_TARGET_ORIGIN,
      );
    } catch (e) {
      console.error(
        `[vite-dev-plugin] Error calling original ${navigationType}: `,
        e,
      );
      window.parent.postMessage(
        {
          type: "navigation-error",
          payload: {
            operation: navigationType,
            message: e.message,
            error: e.toString(),
            stateAttempted: state,
            urlAttempted: url,
          },
        },
        PARENT_TARGET_ORIGIN,
      );
    }
  };

  history.pushState = function (state, title, url) {
    handleStateChangeAndNotify(originalPushState, state, title, url);
  };

  history.replaceState = function (state, title, url) {
    handleStateChangeAndNotify(originalReplaceState, state, title, url);
  };

  // --- Listener for Back/Forward Navigation (popstate event) ---
  window.addEventListener("popstate", () => {
    const currentUrl = window.location.href;
    previousUrl = currentUrl;
  });

  // --- Listener for Commands from Parent ---
  window.addEventListener("message", (event) => {
    if (
      event.source !== window.parent ||
      !event.data ||
      typeof event.data !== "object"
    )
      return;
    if (event.data.type === "navigate") {
      const direction = event.data.payload?.direction;
      if (direction === "forward") history.forward();
      else if (direction === "backward") history.back();
    }
    // === BADGE CONFIG: Hide/show "Made with Kleap" badge ===
    if (event.data.type === "kleap-badge-config") {
      var badge = document.querySelector("[data-kleap-badge]");
      if (event.data.badge === false) {
        if (badge) badge.remove();
        // Prevent KleapBadge component from re-creating it
        window.__kleapBadgeHidden = true;
      } else {
        window.__kleapBadgeHidden = false;
      }
    }
    // === CACHE BUSTING: Hard reload command from Kleap ===
    // This bypasses browser cache to show fresh CSS/JS after AI edits
    if (event.data.type === "kleap-hard-reload") {
      console.log("[kleap-shim] 🔥 Hard reload requested, bypassing cache...");
      // location.reload(true) is deprecated but still works in most browsers
      // It forces the browser to refetch all resources from server
      try {
        // Modern approach: Use fetch cache: 'reload' for critical resources
        // But for full page reload, location.reload() is still the best option
        window.location.reload();
      } catch (e) {
        console.error("[kleap-shim] Hard reload failed:", e);
      }
    }
  });

  // --- Sourcemapped Error Handling ---
  function sendSourcemappedErrorToParent(error, sourceType) {
    if (typeof window.StackTrace === "undefined") {
      console.error("[vite-dev-plugin] StackTrace object not found.");
      // Send simplified raw data if StackTrace isn't available
      window.parent.postMessage(
        {
          type: sourceType,
          payload: {
            message: error?.message || String(error),
            stack:
              error?.stack || "<no stack available - StackTrace.js missing>",
          },
        },
        PARENT_TARGET_ORIGIN,
      );
      return;
    }

    window.StackTrace.fromError(error)
      .then((stackFrames) => {
        const sourcemappedStack = stackFrames
          .map((sf) => sf.toString())
          .join("\n");

        const payload = {
          message: error?.message || String(error),
          stack: sourcemappedStack,
        };

        window.parent.postMessage(
          {
            type: "iframe-sourcemapped-error",
            payload: { ...payload, originalSourceType: sourceType },
          },
          PARENT_TARGET_ORIGIN,
        );
      })
      .catch((mappingError) => {
        console.error(
          "[vite-dev-plugin] Error during stacktrace sourcemapping:",
          mappingError,
        );

        const payload = {
          message: error?.message || String(error),
          // Provide the raw stack or an indication of mapping failure
          stack: error?.stack
            ? `Sourcemapping failed: ${mappingError.message}\n--- Raw Stack ---\n${error.stack}`
            : `Sourcemapping failed: ${mappingError.message}\n<no raw stack available>`,
        };

        window.parent.postMessage(
          {
            type: "iframe-sourcemapped-error",
            payload: { ...payload, originalSourceType: sourceType },
          },
          PARENT_TARGET_ORIGIN,
        );
      });
  }

  window.addEventListener("error", (event) => {
    let error = event.error;
    if (!(error instanceof Error)) {
      window.parent.postMessage(
        {
          type: "window-error",
          payload: {
            message: error ? String(error) : event.message || "Unknown error",
            stack: "<no stack available - an improper error was thrown>",
            filename: event.filename,
            lineno: event.lineno,
            colno: event.colno,
          },
        },
        PARENT_TARGET_ORIGIN,
      );
      return;
    }
    sendSourcemappedErrorToParent(error, "window-error");
  });

  window.addEventListener("unhandledrejection", (event) => {
    let error = event.reason;
    if (!(error instanceof Error)) {
      window.parent.postMessage(
        {
          type: "unhandled-rejection",
          payload: {
            message: error ? String(error) : "Unknown promise rejection",
            stack:
              "<no stack available - an improper error was thrown (promise)>",
          },
        },
        PARENT_TARGET_ORIGIN,
      );
      return;
    }
    sendSourcemappedErrorToParent(error, "unhandled-rejection");
  });

  (function watchForViteErrorOverlay() {
    // --- Configuration for the observer ---
    // We only care about direct children being added or removed.
    const config = {
      childList: true, // Observe additions/removals of child nodes
      subtree: false, // IMPORTANT: Do *not* observe descendants, only direct children
    };

    // --- Callback function executed when mutations are observed ---
    const observerCallback = function (mutationsList) {
      // Iterate through all mutations that just occurred
      for (const mutation of mutationsList) {
        // We are only interested in nodes that were added
        if (mutation.type === "childList" && mutation.addedNodes.length > 0) {
          // Check each added node
          for (const node of mutation.addedNodes) {
            // Check if it's an ELEMENT_NODE (type 1) and has the correct ID
            if (
              node.nodeType === Node.ELEMENT_NODE &&
              node.tagName === "vite-error-overlay".toUpperCase()
            ) {
              reportViteErrorOverlay(node);
            }
          }
        }
      }
    };

    function reportViteErrorOverlay(node) {
      console.log(`Detected vite error overlay: ${node}`);
      try {
        window.parent.postMessage(
          {
            type: "build-error-report",
            payload: {
              message: node.shadowRoot.querySelector(".message").textContent,
              file: node.shadowRoot.querySelector(".file").textContent,
              frame: node.shadowRoot.querySelector(".frame").textContent,
            },
          },
          PARENT_TARGET_ORIGIN,
        );
      } catch (error) {
        console.error("Could not report vite error overlay", error);
      }
    }

    // --- Wait for DOM ready logic ---
    if (document.readyState === "loading") {
      // The document is still loading, wait for DOMContentLoaded
      document.addEventListener("DOMContentLoaded", () => {
        if (!document.body) {
          console.error(
            "document.body does not exist - something very weird happened",
          );
          return;
        }

        const node = document.body.querySelector("vite-error-overlay");
        if (node) {
          reportViteErrorOverlay(node);
        }
        const observer = new MutationObserver(observerCallback);
        observer.observe(document.body, config);
      });
      console.log(
        "Document loading, waiting for DOMContentLoaded to set up observer.",
      );
    } else {
      if (!document.body) {
        console.error(
          "document.body does not exist - something very weird happened",
        );
        return;
      }
      // The DOM is already interactive or complete
      console.log("DOM already ready, setting up observer immediately.");
      const observer = new MutationObserver(observerCallback);
      observer.observe(document.body, config);
    }
  })();
})();

</script>
<script>
/* kleap-react-tagger.js */
(() => {
  console.log("[kleap-react-tagger] Initializing React component tagger");

  // Counter for unique IDs

  // Helper to get component path for better identification
  function getComponentPath(element) {
    const path = [];
    let current = element;
    let depth = 0;
    const maxDepth = 5; // Limit depth to avoid too long paths

    while (current && current !== document.body && depth < maxDepth) {
      let identifier = current.tagName.toLowerCase();

      // Add class or id for better identification
      if (current.id) {
        identifier += `#${current.id}`;
      } else if (current.className && typeof current.className === "string") {
        const firstClass = current.className.trim().split(" ")[0];
        if (firstClass && !firstClass.startsWith("_")) {
          identifier += `.${firstClass}`;
        }
      }

      path.unshift(identifier);
      current = current.parentElement;
      depth++;
    }

    return path.join(" > ");
  }

  // Generate unique ID based on element position and content
  function generateUniqueId(element) {
    const path = getComponentPath(element);
    const text = element.textContent?.trim().substring(0, 20) || "";
    const tag = element.tagName.toLowerCase();

    // Create hash from path and content for uniqueness
    const hashInput = `${path}-${text}-${tag}`;
    let hash = 0;
    for (let i = 0; i < hashInput.length; i++) {
      const char = hashInput.charCodeAt(i);
      hash = (hash << 5) - hash + char;
      hash = hash & hash; // Convert to 32bit integer
    }

    return `kleap-${Math.abs(hash).toString(36)}`;
  }

  // Enhanced approach: tag all elements intelligently
  function tagAllElements() {
    const elements = document.querySelectorAll("*:not([data-kleap-id])");
    let taggedCount = 0;

    elements.forEach((element) => {
      // Skip script, style, and other non-visual elements
      const tagName = element.tagName.toLowerCase();
      if (
        [
          "script",
          "style",
          "meta",
          "link",
          "head",
          "title",
          "html",
          "body",
          "noscript",
        ].includes(tagName)
      ) {
        return;
      }

      // Don't skip SVG elements - they're visual!
      // Allow SVG but skip internal SVG elements like path, circle, etc
      if (element instanceof SVGElement && !["svg", "g"].includes(tagName)) {
        return;
      }

      // Skip elements that are purely decorative or layout
      if (element.getAttribute("aria-hidden") === "true") {
        return;
      }

      // Create unique ID based on element content and position
      const kleapId = generateUniqueId(element);
      const kleapPath = getComponentPath(element);

      // Better naming for components
      let kleapName = tagName;

      // Try to get a meaningful name from various sources
      if (element.className && typeof element.className === "string") {
        const classes = element.className
          .trim()
          .split(" ")
          .filter((c) => c && !c.startsWith("_"));
        if (classes.length > 0) {
          kleapName = `${tagName}.${classes[0]}`;
        }
      } else if (element.id) {
        kleapName = `${tagName}#${element.id}`;
      } else if (element.getAttribute("role")) {
        kleapName = `${tagName}[role=${element.getAttribute("role")}]`;
      } else if (element.getAttribute("aria-label")) {
        kleapName = `${tagName}[${element.getAttribute("aria-label")}]`;
      }

      // Store ID and metadata for easy retrieval
      element.setAttribute("data-kleap-id", kleapId);
      element.setAttribute("data-kleap-name", kleapName);
      element.setAttribute("data-kleap-path", kleapPath);

      // Store the actual text content for this element
      const textContent = element.textContent?.trim();
      if (textContent && textContent.length > 0) {
        element.setAttribute("data-kleap-text", textContent.substring(0, 100));
      }
      taggedCount++;
    });

    if (taggedCount > 0) {
      console.log(`[kleap-react-tagger] Tagged ${taggedCount} elements`);
    }
  }

  // Watch for DOM changes and tag new elements
  function setupMutationObserver() {
    const observer = new MutationObserver((mutations) => {
      let hasNewElements = false;

      mutations.forEach((mutation) => {
        if (mutation.type === "childList" && mutation.addedNodes.length > 0) {
          mutation.addedNodes.forEach((node) => {
            if (node.nodeType === 1 && !node.hasAttribute("data-kleap-id")) {
              hasNewElements = true;
            }
          });
        }
      });

      if (hasNewElements) {
        tagAllElements();
      }
    });

    observer.observe(document.body, {
      childList: true,
      subtree: true,
    });

    console.log("[kleap-react-tagger] Mutation observer setup complete");
  }

  // Initialize when DOM is ready
  function initialize() {
    if (!document.body) {
      setTimeout(initialize, 100);
      return;
    }

    // Tag existing elements
    tagAllElements();

    // Setup observer for future elements
    setupMutationObserver();

    // Also re-tag periodically to catch any missed elements
    setInterval(tagAllElements, 2000);
  }

  // Start initialization
  if (document.readyState === "loading") {
    document.addEventListener("DOMContentLoaded", initialize);
  } else {
    initialize();
  }

  console.log("[kleap-react-tagger] Setup complete");
})();

</script>

  const supportedLangs = [
    "en",
    "fr",
    "de",

  // Detect language from document or parent frame
  function detectLanguage() {
    // Check document lang attribute
    const docLang = document.documentElement.lang || "";
    const langCode = docLang.split("-")[0].toLowerCase();
    if (supportedLangs.includes(langCode)) return langCode;

    // Check URL for locale pattern (e.g., /fr/, /en/)
    const pathMatch = window.location.pathname.match(/^\/([a-z]{2})\//);
    if (pathMatch && supportedLangs.includes(pathMatch[1])) return pathMatch[1];

    // Default to English
    return "en";
  }

  const currentLang = detectLanguage();
  const t = (key) =>
    translations[currentLang]?.[key] || translations.en[key] || key;

  /* ---------- helpers --------------------------------------------------- */
  const css = (el, obj) => Object.assign(el.style, obj);

  function getElementPath(element) {
    const path = [];
    let current = element;
    let depth = 0;
    const maxDepth = 5;

    while (current && current !== document.body && depth < maxDepth) {
      let identifier = current.tagName.toLowerCase();

      if (current.id) {
        identifier += `#${current.id}`;
      } else if (current.className && typeof current.className === "string") {
        const firstClass = current.className
          .trim()
          .split(" ")
          .filter((c) => c && !c.startsWith("_"))[0];
        if (firstClass) {
          identifier += `.${firstClass}`;
        }
      }

      path.unshift(identifier);
      current = current.parentElement;
      depth++;
    }

    return path.join(" > ");
  }

  function isTextElement(el) {
    if (!el) return false;

    // Tags that are inherently text-focused (always editable if they have text)
    const pureTextTags = [
      "H1",
      "H2",
      "H3",
      "H4",
      "H5",
      "H6",
      "P",
      "SPAN",
      "A",
      "BUTTON",
      "LABEL",
      "LI",
      "TD",
      "TH",
    ];

    // Container tags — only editable if they have DIRECT text nodes (not just nested children)
    const containerTags = [
      "DIV",
      "SECTION",
      "ARTICLE",
      "MAIN",
      "HEADER",
      "FOOTER",
      "NAV",
      "ASIDE",
    ];

    const tag = el.tagName;

    if (pureTextTags.includes(tag)) {
      // For pure text tags, check they actually have visible text
      const text = (el.textContent || "").trim();
      if (!text) return false;
      // Reject if it has too many child elements (it's a container, not a text block)
      if (el.children.length > 3) return false;
      return true;
    }

    if (containerTags.includes(tag)) {
      // For containers, only return true if the element has DIRECT text nodes
      // (not just text inherited from deeply nested children)
      const directText = getDirectTextContent(el);
      if (directText.trim().length === 0) return false;
      // Must be a simple container with few or no child elements
      if (el.children.length > 1) return false;
      return true;
    }

    // For any other element, check direct text + single child
    const directText = getDirectTextContent(el);
    return directText.trim().length > 0 && el.children.length <= 1;
  }

  // Get only the text directly owned by this element (not from children)
  function getDirectTextContent(el) {
    let text = "";
    for (const node of el.childNodes) {
      if (node.nodeType === Node.TEXT_NODE) {
        text += node.textContent;
      }
    }
    return text;
  }

  function isImageElement(el) {
    return el && el.tagName === "IMG";
  }

  function createMenu(rect, items) {
    injectMenuStyles();

    const menu = document.createElement("div");
    menu.className = "kleap-menu";

    // Position menu below element, or above if not enough space
    const spaceBelow = window.innerHeight - rect.bottom;
    const spaceAbove = rect.top;
    const menuHeight = items.length * 36 + 8; // approximate

    let top, left;
    if (spaceBelow >= menuHeight || spaceBelow >= spaceAbove) {
      top = Math.min(rect.bottom + 6, window.innerHeight - menuHeight - 10);
    } else {
      top = Math.max(10, rect.top - menuHeight - 6);
    }
    left = Math.min(Math.max(10, rect.left), window.innerWidth - 200);

    css(menu, {
      top: `${top}px`,
      left: `${left}px`,
    });

    items.forEach((item) => {
      if (item.separator) {
        const sep = document.createElement("div");
        sep.className = "kleap-menu-separator";
        menu.appendChild(sep);
        return;
      }

      const menuItem = document.createElement("div");
      menuItem.className = "kleap-menu-item";

      const icon = document.createElement("span");
      icon.className = "kleap-menu-icon";
      icon.innerHTML = item.icon;

      const label = document.createElement("span");
      label.textContent = item.label;

      menuItem.appendChild(icon);
      menuItem.appendChild(label);

      menuItem.onclick = (e) => {
        e.stopPropagation();
        closeMenu();
        item.action();
      };

      menu.appendChild(menuItem);
    });

    document.body.appendChild(menu);

    // Close menu on click outside or escape
    const closeMenu = () => {
      menu.remove();
      document.removeEventListener("click", handleOutsideClick);
      document.removeEventListener("keydown", handleEscape);
    };

    const handleOutsideClick = (e) => {
      if (!menu.contains(e.target)) {
        closeMenu();
      }
    };

    const handleEscape = (e) => {
      if (e.key === "Escape") {
        closeMenu();
      }
    };

    setTimeout(() => {
      document.addEventListener("click", handleOutsideClick);
      document.addEventListener("keydown", handleEscape);
    }, 0);

    return { menu, closeMenu };
  }

  function deleteElement(el) {
    const desc = el.tagName.toLowerCase();
    const text = (el.textContent || "").substring(0, 40).trim();
    const msg = text
      ? `Delete the ${desc} element "${text}"`
      : `Delete the ${desc} element`;
    window.parent.postMessage(
      {
        type: "kleap-delete-element",
        message: msg,
        elementId: el.getAttribute("data-kleap-id"),
      },
      "*",
    );
  }

  function sendToAI(el) {
    // Generate ID and name
    let id = el.dataset.kleapId;
    let name = el.dataset.kleapName;
    let path = el.dataset.kleapPath;

    if (!id) {
      const tag = el.tagName.toLowerCase();
      const uniqueId = Math.random().toString(36).substr(2, 9);
      if (el.id) {
        id = `${tag}#${el.id}`;
      } else if (el.className && typeof el.className === "string") {
        const firstClass = el.className.trim().split(" ")[0];
        id = `${tag}.${firstClass}-${uniqueId}`;
      } else {
        id = `${tag}-${uniqueId}`;
      }
    }

    if (!name) {
      const tag = el.tagName.toLowerCase();
      if (el.className && typeof el.className === "string") {
        const classes = el.className
          .trim()
          .split(" ")
          .filter((c) => c && !c.startsWith("_"));
        const meaningfulClass = classes.find(
          (c) =>
            !c.match(
              /^(flex|grid|block|inline|absolute|relative|fixed|sticky|w-|h-|p-|m-|text-|bg-|border-|rounded-|shadow-|opacity-|z-)/,
            ),
        );
        name = meaningfulClass
          ? `${tag}.${meaningfulClass}`
          : `${tag}.${classes[0] || ""}`;
      } else {
        name = tag;
      }
    }

    if (!path) {
      path = getElementPath(el);
    }

    window.parent.postMessage(
      {
        type: "kleap-component-selected",
        id: id,
        name: name,
        path: path,
        tagName: el.tagName.toLowerCase(),
        className: el.className || "",
        textContent: el.textContent ? el.textContent.substring(0, 100) : "",
        hasChildren: el.children.length > 0,
        rect: {
          width: el.offsetWidth,
          height: el.offsetHeight,
        },
      },
      "*",
    );
  }

    });

    const header = document.createElement("div");
    css(header, {

      padding: "20px 24px",
    });

    const footer = document.createElement("div");
    css(footer, {
      padding: "16px 24px",
      borderTop: "1px solid #eee",
      display: "flex",
      gap: "8px",
      justifyContent: "flex-end",
    });

    const cancelBtn = document.createElement("button");
    cancelBtn.textContent = t("cancel");
    css(cancelBtn, {
      padding: "8px 16px",
      border: "1px solid #ddd",
      borderRadius: "8px",
      background: "white",
      color: "#666",
      fontSize: "14px",
      cursor: "pointer",
      fontFamily:
        '-apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif',
    });

    const saveBtn = document.createElement("button");
    saveBtn.textContent = t("apply");
    css(saveBtn, {
      padding: "8px 20px",
      border: "none",
      borderRadius: "8px",
      background: "#ff0055",
      color: "white",
      fontSize: "14px",
      cursor: "pointer",
      fontFamily:
        '-apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif',
    });

    footer.appendChild(cancelBtn);
    footer.appendChild(saveBtn);

    dialog.appendChild(header);
    dialog.appendChild(content);
    dialog.appendChild(footer);
    overlay.appendChild(dialog);
    document.body.appendChild(overlay);

    const close = () => overlay.remove();

    cancelBtn.onclick = close;
    overlay.onclick = (e) => {
      if (e.target === overlay) close();
    };

    const result = {
      content,
      saveBtn,
      close,
      onSave: null,
    };

    saveBtn.onclick = () => {
      if (result.onSave) result.onSave();
      close();
    };

    // Handle keyboard
    document.addEventListener("keydown", function handleKey(e) {
      if (e.key === "Escape") {
        close();
        document.removeEventListener("keydown", handleKey);
      }
    });

    return result;
  }

        id:
          img.dataset.kleapId ||
          `img-${Math.random().toString(36).substr(2, 9)}`,
        oldSrc: originalSrc,
        newSrc: newSrc,
        alt: img.alt || "",
      },
      "*",
    );
  }

      "paddingTop",

      "paddingLeft",

      "marginLeft",
      "gap",
      "borderRadius",
      "borderWidth",
      "borderColor",

    trackedProps.forEach((p) => {
      originalStyles[p] = el.style[p];
    });

    const changedProps = {};
    let changeCount = 0;
    let applyBtn = null;
    let changeDot = null;

    function updateChangeIndicators() {
      changeCount = Object.keys(changedProps).length;
      if (applyBtn) {
        if (changeCount > 0) {
          applyBtn.querySelector(".dp-apply-text").textContent =
            (t("apply") || "Apply") + " (" + changeCount + ")";
          css(applyBtn, { opacity: "1", pointerEvents: "auto" });

            t("apply") || "Apply";
          css(applyBtn, { opacity: "0.4", pointerEvents: "none" });

      if (changeDot) {
        changeDot.style.opacity = changeCount > 0 ? "1" : "0";

      if (
        document.documentElement.classList.contains("dark") ||
        document.body.classList.contains("dark")

      const cs = getComputedStyle(document.documentElement).colorScheme;
      if (cs === "dark") return true;
      const bg = getComputedStyle(document.body).backgroundColor;
      const m = bg.match(/\d+/g);
      if (m && m.length >= 3) {

    // ─── UI builder helpers ───────────────────────────────────
    function createSection(labelText, startExpanded) {
      const section = document.createElement("div");

      const sectionHeader = document.createElement("div");
      css(sectionHeader, {
        display: "flex",
        alignItems: "center",
        justifyContent: "space-between",
        padding: "10px 16px",
        cursor: "pointer",
        userSelect: "none",
        transition: "background 0.15s",
      });
      sectionHeader.onmouseenter = () => {
        sectionHeader.style.background = T.surfaceHover;
      };
      sectionHeader.onmouseleave = () => {
        sectionHeader.style.background = "transparent";
      };

      const lbl = document.createElement("div");
      css(lbl, {
        fontSize: "11px",
        fontWeight: "600",
        color: T.textMuted,
        textTransform: "uppercase",
        letterSpacing: "0.06em",
      });
      lbl.textContent = labelText;

      const chevron = document.createElement("span");
      chevron.innerHTML = icons.chevron;
      chevron.className = "dp-chevron" + (startExpanded ? "" : " collapsed");
      css(chevron, {
        color: T.textFaint,
        display: "flex",
        alignItems: "center",
      });

      sectionHeader.appendChild(lbl);
      sectionHeader.appendChild(chevron);
      section.appendChild(sectionHeader);

      const content = document.createElement("div");
      content.className =
        "dp-section-body" + (startExpanded ? "" : " collapsed");
      css(content, { padding: "0 16px 12px" });
      if (startExpanded) {
        content.style.maxHeight = "600px";
        content.style.opacity = "1";
      }

      sectionHeader.onclick = () => {
        const isCollapsed = content.classList.contains("collapsed");
        if (isCollapsed) {
          content.classList.remove("collapsed");
          content.style.maxHeight = "600px";
          content.style.opacity = "1";
          chevron.classList.remove("collapsed");
        } else {
          content.classList.add("collapsed");
          chevron.classList.add("collapsed");
        }
      };

      section.appendChild(content);
      section._content = content;
      return section;
    }

    function createRow(items, opts) {

      css(row, {

        alignItems: "center",
        gap: "10px",
        marginBottom: opts?.mb || "8px",
      });
      items.forEach((item) => row.appendChild(item));
      return row;

    function createLabel(text) {

      css(lbl, {

        flexShrink: "0",

    function createColorInput(initialValue, onChange) {
      const wrapper = document.createElement("div");
      css(wrapper, {
        display: "flex",
        flexDirection: "column",
        gap: "8px",
        flex: "1",
      });

      // Top row: color input + hex display
      const topRow = document.createElement("div");
      css(topRow, { display: "flex", alignItems: "center", gap: "8px" });

      const colorInput = document.createElement("input");
      colorInput.type = "color";
      colorInput.value = initialValue || "#000000";
      css(colorInput, {
        width: "36px",
        height: "36px",
        borderRadius: "50%",
        border: "2px solid " + T.inputBorder,
        cursor: "pointer",
        background: T.inputBg,
        flexShrink: "0",
        transition: "border-color 0.15s",
      });
      colorInput.onfocus = () => {
        colorInput.style.borderColor = T.accent;
      };
      colorInput.onblur = () => {
        colorInput.style.borderColor = T.inputBorder;
      };

      const hexDisplay = document.createElement("span");
      css(hexDisplay, {
        fontSize: "11px",
        color: T.textMuted,
        fontFamily: "monospace",
        letterSpacing: "0.02em",
      });
      hexDisplay.textContent = initialValue || "#000000";

      colorInput.oninput = (e) => {
        hexDisplay.textContent = e.target.value;
        onChange(e.target.value);
        // Update active swatch ring
        swatchEls.forEach((s) => {
          s.style.boxShadow =
            s.dataset.color === e.target.value
              ? "0 0 0 2px " + T.accent
              : "none";
        });
      };

      topRow.appendChild(colorInput);
      topRow.appendChild(hexDisplay);
      wrapper.appendChild(topRow);

      // Preset swatches — circular, organized
      const swatchGrid = document.createElement("div");
      css(swatchGrid, {
        display: "grid",
        gridTemplateColumns: "repeat(8, 1fr)",
        gap: "4px",
      });
      const presetColors = [
        "#000000",
        "#374151",
        "#6b7280",
        "#9ca3af",
        "#d1d5db",
        "#e5e7eb",
        "#f3f4f6",
        "#ffffff",
        "#ef4444",
        "#f97316",
        "#eab308",
        "#22c55e",
        "#14b8a6",
        "#3b82f6",
        "#8b5cf6",
        "#ec4899",
      ];
      const swatchEls = [];
      presetColors.forEach((c) => {
        const swatch = document.createElement("div");
        swatch.dataset.color = c;
        css(swatch, {
          width: "24px",
          height: "24px",
          borderRadius: "50%",
          cursor: "pointer",
          background: c,
          border:
            "1px solid " +
            (c === "#ffffff" || c === "#f3f4f6" || c === "#e5e7eb"
              ? T.borderStrong
              : "transparent"),
          transition: "transform 0.12s ease, box-shadow 0.12s ease",
          boxShadow: c === initialValue ? "0 0 0 2px " + T.accent : "none",
        });
        swatch.onmouseenter = () => {
          swatch.style.transform = "scale(1.18)";
        };
        swatch.onmouseleave = () => {
          swatch.style.transform = "scale(1)";
        };
        swatch.onclick = () => {
          colorInput.value = c;
          hexDisplay.textContent = c;
          onChange(c);
          swatchEls.forEach((s) => {
            s.style.boxShadow = "none";
          });
          swatch.style.boxShadow = "0 0 0 2px " + T.accent;
        };
        swatchEls.push(swatch);
        swatchGrid.appendChild(swatch);
      });
      wrapper.appendChild(swatchGrid);
      return wrapper;
    }

    function createSlider(min, max, initialValue, unit, onChange) {
      const wrapper = document.createElement("div");
      css(wrapper, {
        display: "flex",
        alignItems: "center",
        gap: "8px",
        flex: "1",
      });

      const slider = document.createElement("input");
      slider.type = "range";
      slider.min = min;
      slider.max = max;
      slider.value = initialValue;
      css(slider, { flex: "1" });

      const valueDisplay = document.createElement("span");
      css(valueDisplay, {
        fontSize: "11px",
        color: T.textMuted,
        minWidth: "34px",
        textAlign: "right",
        fontFamily: "monospace",
        fontVariantNumeric: "tabular-nums",
      });
      valueDisplay.textContent = initialValue + unit;

      slider.oninput = (e) => {
        valueDisplay.textContent = e.target.value + unit;
        onChange(e.target.value);
      };

      wrapper.appendChild(slider);
      wrapper.appendChild(valueDisplay);
      return wrapper;
    }

    function createSelect(options, initialValue, onChange) {
      let currentValue = initialValue;
      const wrapper = document.createElement("div");
      css(wrapper, { position: "relative", flex: "1" });

      const trigger = document.createElement("button");
      css(trigger, {
        width: "100%",
        padding: "6px 28px 6px 10px",
        borderRadius: "8px",
        border: "1px solid " + T.inputBorder,
        fontSize: "12px",
        background: T.inputBg,
        color: T.text,
        cursor: "pointer",
        outline: "none",
        transition: "border-color 0.15s",
        textAlign: "left",
        fontFamily: "inherit",
        position: "relative",
      });
      const currentLabel = options.find(([v]) => v === initialValue);
      trigger.textContent = currentLabel ? currentLabel[1] : initialValue;

      // Chevron
      const arrow = document.createElement("span");
      arrow.innerHTML =
        '<svg width="10" height="10" viewBox="0 0 10 10" fill="none"><path d="M3 4l2 2 2-2" stroke="currentColor" stroke-width="1.3" stroke-linecap="round" stroke-linejoin="round"/></svg>';
      css(arrow, {
        position: "absolute",
        right: "8px",
        top: "50%",
        transform: "translateY(-50%)",
        color: T.textFaint,
        pointerEvents: "none",
        display: "flex",
      });
      trigger.appendChild(arrow);

      // Dropdown
      const dropdown = document.createElement("div");
      css(dropdown, {
        position: "absolute",
        top: "calc(100% + 4px)",
        left: "0",
        right: "0",
        background: T.bg,
        backdropFilter: "blur(20px)",
        WebkitBackdropFilter: "blur(20px)",
        border: "1px solid " + T.borderStrong,
        borderRadius: "8px",
        overflow: "hidden",
        zIndex: "10",
        display: "none",
        boxShadow: "0 4px 16px rgba(0,0,0,0.10)",
      });

      options.forEach(([val, label]) => {
        const item = document.createElement("div");
        css(item, {
          padding: "6px 10px",
          fontSize: "12px",
          cursor: "pointer",
          color: val === currentValue ? T.accent : T.text,
          fontWeight: val === currentValue ? "600" : "400",
          background: "transparent",
          transition: "background 0.1s",
        });
        item.textContent = label;
        item.onmouseenter = () => {
          item.style.background = T.surfaceHover;
        };
        item.onmouseleave = () => {
          item.style.background = "transparent";
        };
        item.onclick = (e) => {
          e.stopPropagation();
          currentValue = val;
          trigger.textContent = label;
          trigger.appendChild(arrow);
          dropdown.style.display = "none";
          // Update active states
          [...dropdown.children].forEach((d, i) => {
            css(d, {
              color: options[i][0] === val ? T.accent : T.text,
              fontWeight: options[i][0] === val ? "600" : "400",
            });
          });
          onChange(val);
        };
        dropdown.appendChild(item);
      });

      let isOpen = false;
      trigger.onclick = () => {
        isOpen = !isOpen;
        dropdown.style.display = isOpen ? "block" : "none";
        trigger.style.borderColor = isOpen ? T.accent : T.inputBorder;
      };
      // Close on outside click
      const closeDropdown = (e) => {
        if (!wrapper.contains(e.target)) {
          isOpen = false;
          dropdown.style.display = "none";
          trigger.style.borderColor = T.inputBorder;
        }
      };
      document.addEventListener("mousedown", closeDropdown);

      wrapper.appendChild(trigger);
      wrapper.appendChild(dropdown);
      wrapper._cleanup = () =>
        document.removeEventListener("mousedown", closeDropdown);
      return wrapper;
    }

    function createIconButtonGroup(options, initialValue, onChange) {
      const group = document.createElement("div");
      css(group, {

          border: "none",
          borderRight:

    function createSpacingGrid(type, sides, computed, applyStyleFn) {
      const container = document.createElement("div");
      css(container, { marginBottom: "10px" });

      const labelRow = document.createElement("div");
      css(labelRow, {
        display: "flex",
        alignItems: "center",
        justifyContent: "space-between",
        marginBottom: "6px",
      });

      const lbl = document.createElement("div");
      css(lbl, { fontSize: "12px", color: T.textMuted, fontWeight: "500" });
      lbl.textContent =
        type === "padding"
          ? t("dpPadding") || "Padding"
          : t("dpMargin") || "Margin";
      labelRow.appendChild(lbl);

      let linked = false;
      const linkBtn = document.createElement("button");
      css(linkBtn, {
        background: "none",
        border: "1px solid " + T.inputBorder,
        borderRadius: "6px",
        cursor: "pointer",
        padding: "3px 6px",
        color: T.textFaint,
        display: "flex",
        alignItems: "center",
        transition: "all 0.15s",
      });
      linkBtn.innerHTML = icons.link;
      linkBtn.title = "Link all sides";
      linkBtn.onclick = () => {
        linked = !linked;
        css(linkBtn, {
          background: linked ? T.accent : "none",
          color: linked ? "#fff" : T.textFaint,
          borderColor: linked ? T.accent : T.inputBorder,
        });
      };
      labelRow.appendChild(linkBtn);
      container.appendChild(labelRow);

      // Side labels + inputs in a modern grid
      const grid = document.createElement("div");
      css(grid, {
        display: "grid",
        gridTemplateColumns: "repeat(4, 1fr)",
        gap: "4px",
      });

      // Labels
      ["T", "R", "B", "L"].forEach((hint) => {
        const h = document.createElement("div");
        css(h, {
          fontSize: "9px",
          color: T.textFaint,
          textAlign: "center",
          fontWeight: "600",
          letterSpacing: "0.05em",
          marginBottom: "2px",
        });
        h.textContent = hint;
        grid.appendChild(h);
      });

      // Inputs
      const inputs = [];
      sides.forEach((side) => {
        const input = document.createElement("input");
        input.type = "number";
        input.min = type === "padding" ? "0" : "-100";
        input.max = "200";
        input.value = parseInt(computed[type + side]) || 0;
        css(input, {
          width: "100%",
          padding: "6px 4px",
          borderRadius: "8px",
          border: "1px solid " + T.inputBorder,
          fontSize: "12px",
          textAlign: "center",
          boxSizing: "border-box",
          background: T.inputBg,
          color: T.text,
          outline: "none",
          transition: "border-color 0.15s",
        });
        input.onfocus = () => {
          input.style.borderColor = T.accent;
        };
        input.onblur = () => {
          input.style.borderColor = T.inputBorder;
        };
        input.oninput = (e) => {
          const val = e.target.value;
          if (linked) {
            inputs.forEach((inp) => {
              inp.value = val;
            });
            sides.forEach((s) => applyStyleFn(type + s, val + "px"));
          } else {
            applyStyleFn(type + side, val + "px");
          }
        };
        inputs.push(input);
        grid.appendChild(input);
      });
      container.appendChild(grid);
      return container;
    }

    // ─── Get computed styles ──────────────────────────────────
    const computed = window.getComputedStyle(el);

    function rgbToHex(rgb) {
      if (!rgb || rgb === "transparent" || rgb === "rgba(0, 0, 0, 0)")
        return "#ffffff";
      const match = rgb.match(/\d+/g);
      if (!match || match.length < 3) return "#000000";
      return (
        "#" +
        match
          .slice(0, 3)
          .map((x) => parseInt(x).toString(16).padStart(2, "0"))
          .join("")
      );
    }

      padding: "7px 18px",
      borderRadius: "8px",
      border: "none",
      background: T.accent,
      color: "#fff",
      fontSize: "13px",
      fontWeight: "500",
      cursor: "pointer",
      transition: "all 0.15s ease",
      opacity: "0.4",
      pointerEvents: "none",
      display: "flex",
      alignItems: "center",
      gap: "6px",
    });
    const applyCheck = document.createElement("span");
    applyCheck.innerHTML =
      '<svg width="14" height="14" viewBox="0 0 14 14" fill="none"><path d="M3 7l3 3 5-5" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"/></svg>';
    css(applyCheck, { display: "flex", alignItems: "center" });
    const applyText = document.createElement("span");
    applyText.className = "dp-apply-text";
    applyText.textContent = t("apply") || "Apply";
    applyBtn.appendChild(applyCheck);
    applyBtn.appendChild(applyText);
    applyBtn.onmouseenter = () => {
      if (Object.keys(changedProps).length > 0)
        applyBtn.style.background = T.accentHover;
    };
    applyBtn.onmouseleave = () => {
      applyBtn.style.background = T.accent;
    };
    applyBtn.onclick = () => applyPanel();

    footer.appendChild(cancelBtn);
    footer.appendChild(applyBtn);
    panel.appendChild(footer);

    // ─── Add panel to DOM ─────────────────────────────────────
    document.body.appendChild(panel);

    // Highlight the element being designed
    const originalOutline = el.style.outline;
    const originalOutlineOffset = el.style.outlineOffset;
    el.style.outline = "2px solid " + T.accent;
    el.style.outlineOffset = "3px";

    // ─── Panel close logic ────────────────────────────────────
    let handleDragMove = null;
    let handleDragEnd = null;
    let handleOutsideClick = null;
    let outsideClickTimeout = null;

    function cleanupPanel() {
      el.style.outline = originalOutline;
      el.style.outlineOffset = originalOutlineOffset;
      if (outsideClickTimeout) clearTimeout(outsideClickTimeout);
      if (handleDragMove)
        document.removeEventListener("mousemove", handleDragMove);
      if (handleDragEnd) document.removeEventListener("mouseup", handleDragEnd);
      if (handleOutsideClick)
        document.removeEventListener("mousedown", handleOutsideClick);
      document.removeEventListener("keydown", handlePanelEscape);
      // Cleanup custom select listeners
      panel.querySelectorAll("[data-kleap-ui] div").forEach((el) => {
        if (el._cleanup) el._cleanup();
      });
      panel.remove();
    }

    function cancelPanel() {
      trackedProps.forEach((p) => {
        el.style[p] = originalStyles[p];
      });
      cleanupPanel();
    }

    function applyPanel() {
      if (Object.keys(changedProps).length > 0) {
        // === STYLE OVERRIDE BRIDGE ===
        // Inject a <style> tag that keeps the visual stable during HMR.
        // Without this, saving the file triggers HMR → React re-render → inline styles lost → flash.
        // The override uses !important to beat Tailwind classes until HMR settles.
        const kleapId = el.getAttribute("data-kleap-id");
        if (kleapId) {
          const cssProps = Object.entries(changedProps)
            .map(([prop, value]) => {
              // camelCase to kebab-case
              const kebab = prop.replace(/([A-Z])/g, "-$1").toLowerCase();
              return `${kebab}: ${value} !important`;
            })
            .join("; ");
          const overrideId = "kleap-style-override-" + kleapId;
          // Remove previous override for this element
          const existing = document.getElementById(overrideId);
          if (existing) existing.remove();
          const styleTag = document.createElement("style");
          styleTag.id = overrideId;
          styleTag.textContent = `[data-kleap-id="${kleapId}"] { ${cssProps} }`;
          document.head.appendChild(styleTag);
          // Auto-remove after HMR has settled (5s) — Tailwind classes take over
          setTimeout(() => {
            document.getElementById(overrideId)?.remove();
          }, 5000);
        }

        // Walk up to find closest data-kleap-source (webpack-injected file:line)
        let sourceLocation = "";
        let srcEl = el;
        while (srcEl && srcEl !== document.body) {
          const src = srcEl.getAttribute("data-kleap-source");
          if (src) {
            sourceLocation = src;
            break;
          }
          srcEl = srcEl.parentElement;
        }

        window.parent.postMessage(
          {
            type: "kleap-style-edited",
            kleapId: el.getAttribute("data-kleap-id") || el.id || "",
            kleapPath: el.getAttribute("data-kleap-path") || getElementPath(el),
            className:
              (typeof el.className === "string" ? el.className : "") || "",
            textContent: el.textContent
              ? el.textContent.trim().substring(0, 100)
              : "",
            tagName: el.tagName.toLowerCase(),
            sourceLocation: sourceLocation,
            changes: changedProps,
          },
          "*",
        );
      }
      cleanupPanel();
    }

    function handlePanelEscape(e) {
      if (e.key === "Escape") cancelPanel();
    }
    document.addEventListener("keydown", handlePanelEscape);

    handleOutsideClick = (e) => {
      if (
        !panel.contains(e.target) &&
        e.target !== el &&
        !el.contains(e.target)
      ) {
        cancelPanel();
      }
    };
    outsideClickTimeout = setTimeout(() => {
      document.addEventListener("mousedown", handleOutsideClick);
    }, 100);

    // Make panel draggable by header
    let isDragging = false;
    let dragOffsetX = 0,
      dragOffsetY = 0;
    header.style.cursor = "grab";
    header.onmousedown = (e) => {
      if (e.target === closeBtn || closeBtn.contains(e.target)) return;
      isDragging = true;
      header.style.cursor = "grabbing";
      dragOffsetX = e.clientX - panel.getBoundingClientRect().left;
      dragOffsetY = e.clientY - panel.getBoundingClientRect().top;
    };
    handleDragMove = (e) => {
      if (!isDragging) return;
      panel.style.left = e.clientX - dragOffsetX + "px";
      panel.style.top = e.clientY - dragOffsetY + "px";
    };
    handleDragEnd = () => {
      if (isDragging) {
        isDragging = false;
        header.style.cursor = "grab";
      }
    };
    document.addEventListener("mousemove", handleDragMove);
    document.addEventListener("mouseup", handleDragEnd);
  }

  function enableInlineEdit(el) {
    // Store original state
    const originalText = el.textContent;
    const originalHTML = el.innerHTML;

    // Store ALL original styles
    const originalStyles = {
      outline: el.style.outline,
      outlineOffset: el.style.outlineOffset,
      boxShadow: el.style.boxShadow,
      cursor: el.style.cursor,
      contentEditable: el.contentEditable,
      // Don't modify background, border, or any other styles!
    };

    // Make element editable
    el.contentEditable = "true";
    el.focus();

    // Add ONLY non-intrusive visual feedback
    css(el, {
      outline: "2px solid #ff0055",
      outlineOffset: "3px",
      cursor: "text",
      boxShadow:
        "0 0 0 4px rgba(255, 0, 85, 0.1), 0 4px 12px rgba(0, 0, 0, 0.08)",
      // DO NOT change background, border, borderRadius, or any other properties!
    });

    // Select all text
    const range = document.createRange();
    range.selectNodeContents(el);
    const selection = window.getSelection();
    selection.removeAllRanges();
    selection.addRange(range);

    // Handle blur to save changes
    const handleBlur = () => {
      const newText = el.textContent;

      if (newText !== originalText) {
        // Show saving status on the border
        css(el, {
          outline: "2px solid #FFA500", // Orange for saving
          boxShadow:
            "0 0 0 4px rgba(255, 165, 0, 0.2), 0 4px 12px rgba(0, 0, 0, 0.08)",
        });

        // Send the change to parent
        // Generate ID and name if not present
        const id =
          el.dataset.kleapId ||
          `element-${Math.random().toString(36).substr(2, 9)}`;
        let name = el.dataset.kleapName || el.tagName.toLowerCase();

        if (
          !el.dataset.kleapName &&
          el.className &&
          typeof el.className === "string"
        ) {
          const classes = el.className
            .trim()
            .split(" ")
            .filter((c) => c);
          if (classes.length > 0) {
            name = `${el.tagName.toLowerCase()}.${classes[0]}`;
          }
        }

        window.parent.postMessage(
          {
            type: "kleap-text-edited",
            id: id,
            name: name,
            path: el.dataset.kleapPath || getElementPath(el),
            oldText: originalText,
            newText: newText,
            tagName: el.tagName.toLowerCase(),
          },
          "*",
        );

        // Show success after a moment
        setTimeout(() => {
          css(el, {
            outline: "2px solid #00C851", // Green for success
            boxShadow:
              "0 0 0 4px rgba(0, 200, 81, 0.2), 0 4px 12px rgba(0, 0, 0, 0.08)",
          });

          // Remove all styles after showing success
          setTimeout(() => {
            el.contentEditable = originalStyles.contentEditable || "false";
            css(el, {
              outline: originalStyles.outline || "",
              outlineOffset: originalStyles.outlineOffset || "",
              boxShadow: originalStyles.boxShadow || "",
              cursor: originalStyles.cursor || "",
            });
          }, 500);
        }, 300);
      } else {
        // Restore original HTML if no changes
        el.innerHTML = originalHTML;

        // Restore styles immediately if no changes
        el.contentEditable = originalStyles.contentEditable || "false";
        css(el, {
          outline: originalStyles.outline || "",
          outlineOffset: originalStyles.outlineOffset || "",
          boxShadow: originalStyles.boxShadow || "",
          cursor: originalStyles.cursor || "",
        });
      }

      el.removeEventListener("blur", handleBlur);
      el.removeEventListener("keydown", handleKeydown);
    };

    // Handle escape key to cancel
    const handleKeydown = (e) => {
      if (e.key === "Escape") {
        e.preventDefault();
        el.innerHTML = originalHTML;
        el.blur();
      }
    };

    el.addEventListener("blur", handleBlur);
    el.addEventListener("keydown", handleKeydown);
  }

  function makeOverlay() {
    overlay = document.createElement("div");
    overlay.id = OVERLAY_ID;
    css(overlay, {
      position: "absolute",
      border: "2px solid #ff0055",
      background: "rgba(255,0,85,.05)",
      pointerEvents: "none",
      zIndex: "2147483647", // max
      borderRadius: "8px",
      boxShadow: "0 0 0 1px rgba(255,0,85,0.2), 0 4px 12px rgba(0,0,0,0.08)",
      transition: "all 0.2s cubic-bezier(0.4, 0, 0.2, 1)",
    });

    label = document.createElement("div");
    css(label, {
      position: "absolute",
      left: "50%",
      top: "100%",
      transform: "translateX(-50%) translateY(8px)",
      background: "linear-gradient(135deg, #1a1a1a 0%, #0a0a0a 100%)",
      color: "#fff",
      fontFamily:
        "-apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif",
      fontSize: "13px",
      fontWeight: "500",
      lineHeight: "1.4",
      padding: "0",
      borderRadius: "12px",
      boxShadow:
        "0 8px 32px rgba(0,0,0,0.24), 0 2px 8px rgba(0,0,0,0.16), inset 0 1px 0 rgba(255,255,255,0.06)",
      border: "1px solid rgba(255,255,255,0.08)",
      overflow: "hidden",
      minWidth: "180px",
      animation: "kleapFadeIn 0.2s ease-out",
      pointerEvents: "auto", // Enable clicks on the label
    });
    overlay.appendChild(label);
    document.body.appendChild(overlay);

    // Add animation keyframes
    const style = document.createElement("style");
    style.textContent = `
      @keyframes kleapFadeIn {
        from {
          opacity: 0;
          transform: translateX(-50%) translateY(4px);
        }
        to {
          opacity: 1;
          transform: translateX(-50%) translateY(8px);
        }
      }
      
      #${OVERLAY_ID} .kleap-option {
        transition: all 0.15s ease;
      }
      
      #${OVERLAY_ID} .kleap-option:hover {
        background: rgba(255,255,255,0.06);
      }
      
      #${OVERLAY_ID} .kleap-option:active {
        transform: scale(0.98);
      }
    `;
    document.head.appendChild(style);
  }

  function updateOverlay(el) {
    if (!overlay) makeOverlay();

    const rect = el.getBoundingClientRect();
    css(overlay, {
      top: `${rect.top + window.scrollY}px`,
      left: `${rect.left + window.scrollX}px`,
      width: `${rect.width}px`,
      height: `${rect.height}px`,
      display: "block",
    });

    // Clear previous contents
    while (label.firstChild) {
      label.removeChild(label.firstChild);
    }

    // Always show minimal info when hovering
    const info = document.createElement("div");
    css(info, {
      padding: "8px 12px",
      fontSize: "12px",
      opacity: "0.9",
    });

    // Get a descriptive name for the element
    let name = el.dataset.kleapName || el.tagName.toLowerCase();

    // Try to get a better description
    if (!el.dataset.kleapName) {
      const tag = el.tagName.toLowerCase();

      // Add class names if available
      if (el.className && typeof el.className === "string") {
        const classes = el.className
          .trim()
          .split(" ")
          .filter((c) => c && !c.startsWith("_"));
        if (classes.length > 0) {
          // Filter out utility classes
          const meaningfulClass = classes.find(
            (c) =>
              !c.match(
                /^(flex|grid|block|inline|absolute|relative|fixed|sticky|w-|h-|p-|m-|text-|bg-|border-|rounded-|shadow-|opacity-|z-)/,
              ),
          );
          name = meaningfulClass
            ? `${tag}.${meaningfulClass}`
            : `${tag}.${classes[0]}`;
        }
      } else if (el.id) {
        name = `${tag}#${el.id}`;
      } else if (el.getAttribute("aria-label")) {
        name = `${tag}[${el.getAttribute("aria-label")}]`;
      } else if (el.getAttribute("role")) {
        name = `${tag}[role=${el.getAttribute("role")}]`;
      }
    }

    let actionHint = "";
    if (isTextElement(el)) {
      actionHint = " • Click for options";
    } else if (isImageElement(el)) {
      actionHint = " • Click for options";
    }
    info.textContent = name + actionHint;
    label.appendChild(info);
  }

  /* ---------- event handlers -------------------------------------------- */
  function onMouseMove(e) {
    if (state.type !== "inspecting") return;

    let el = e.target;

    // Don't require data-kleap-id - any element can be selected
    // Skip only truly non-selectable elements
    const nonSelectableTags = [
      "SCRIPT",
      "STYLE",
      "META",
      "LINK",
      "HTML",
      "BODY",
    ];
    while (el && nonSelectableTags.includes(el.tagName)) {
      el = el.parentElement;
    }

    if (state.element === el) return;
    state.element = el;

    if (el) {
      updateOverlay(el);
    } else {
      if (overlay) overlay.style.display = "none";
    }
  }

  function onClick(e) {
    if (state.type !== "inspecting" || !state.element) return;
    e.preventDefault();
    e.stopPropagation();

    const el = state.element;

    // If it's a text element, show text menu (edit or mention to AI)
    if (isTextElement(el)) {
      showTextMenu(el);
      deactivate();
    } else if (isImageElement(el)) {
      // If it's an image, show image edit dialog
      enableImageEdit(el);
      deactivate();
    } else {
      // For non-text, non-image elements, show the design menu
      // ("Mention to AI" removed — mentioning is now the builder's Comment tool).
      const rect = el.getBoundingClientRect();
      createMenu(rect, [
        {
          icon: icons.paintbrush,
          label: t("design"),
          action: () => showDesignPanel(el),
        },
      ]);
      deactivate();
    }
  }

  /* ---------- activation / deactivation --------------------------------- */
  function activate() {
    if (state.type === "inactive") {
      window.addEventListener("mousemove", onMouseMove, true);
      window.addEventListener("click", onClick, true);
    }
    state = { type: "inspecting", element: null };
    if (overlay) {
      overlay.style.display = "none";
    }
  }

  function deactivate() {
    if (state.type === "inactive") return;

    window.removeEventListener("mousemove", onMouseMove, true);
    window.removeEventListener("click", onClick, true);
    if (overlay) {
      overlay.remove();
      overlay = null;
      label = null;
    }
    state = { type: "inactive" };
  }

  /* ---------- message bridge -------------------------------------------- */
  window.addEventListener("message", (e) => {
    if (e.source !== window.parent) return;
    if (e.data.type === "activate-kleap-component-selector") activate();
    if (e.data.type === "deactivate-kleap-component-selector") deactivate();
  });

  function initializeComponentSelector() {
    if (!document.body) {
      console.error(
        "Kleap component selector initialization failed: document.body not found.",
      );
      return;
    }
    setTimeout(() => {
      if (document.body.querySelector("[data-kleap-id]")) {
        window.parent.postMessage(
          {
            type: "kleap-component-selector-initialized",
          },
          "*",
        );
        console.debug("Kleap component selector initialized");
      } else {
        console.warn(
          "Kleap component selector not initialized because no DOM elements were tagged",
        );
      }
    }, 0);
  }

  if (document.readyState === "loading") {
    document.addEventListener("DOMContentLoaded", initializeComponentSelector);
  } else {
    initializeComponentSelector();
  }
})();

</script><script>(function(){
  // Parse the raw href STRING (no new URL — this runs in a srcdoc iframe whose
  // location is about:srcdoc, so URL resolution against location.href throws and
  // any "/" link would otherwise fall through and navigate the iframe to the
  // PARENT app root). Route = path part, normalized; hash kept for anchor scroll.
  function parse(h){
    if(!h) return null;
    if(h.charAt(0)==='#') return {route:null,hash:h};            // same-page anchor → scroll
    if(/^[a-z][a-z0-9+.-]*:/i.test(h) || h.indexOf('//')===0) return {external:true}; // http(s):, mailto:, tel:, //
    var hash='', q=h.indexOf('#'); if(q>=0){hash=h.slice(q);h=h.slice(0,q);}
    var qm=h.indexOf('?'); if(qm>=0) h=h.slice(0,qm);
    if(h.charAt(0)!=='/') h='/'+h;                                // relative → absolute path
    h=h.replace(/\/index\.html$/,'/').replace(/\.html$/,'');
    if(h!=='/'&&h.charAt(h.length-1)==='/') h=h.slice(0,-1);
    return {route:h||'/',hash:hash};
  }
  document.addEventListener('click',function(e){
    var a=e.target&&e.target.closest&&e.target.closest('a[href]');if(!a)return;
    var p=parse(a.getAttribute('href'));
    if(p&&p.external){a.target='_blank';return;}                  // external → new tab, native ok
    // 🔒 srcdoc trap: with allow-same-origin the iframe's BASE URL is the PARENT
    // app's URL (localhost:3000/chat?...), so ANY native nav — a relative path,
    // "#", "#section", or empty href="" — resolves there and loads the WHOLE
    // Kleap app INSIDE the preview. So ALWAYS preventDefault for non-external
    // links and handle them in-frame: scroll for anchors, postMessage for routes.
    e.preventDefault();
    if(!p||p.route===null){                                       // "#", "#section", or empty href
      var id=p&&p.hash?p.hash.slice(1):'';
      if(id){var el=document.getElementById(id);if(el)el.scrollIntoView({behavior:'smooth'});}
      else{try{window.scrollTo({top:0,behavior:'smooth'});}catch(_e){window.scrollTo(0,0);}}
      return;
    }
    parent.postMessage({__kleapNav:p.route,hash:p.hash||''},'*');
  },true);
  // 🔒 Same srcdoc trap for <form> submit: a form with no/relative/"#" action
  // (a contact form, search box, login) would submit to the PARENT app URL and
  // load the whole Kleap app inside the preview. Block native submit for any
  // form that isn't posting to an absolute external URL — real data handling in
  // the preview is done client-side from islands (fetch/Supabase), not native
  // form POST. Islands that call e.preventDefault() themselves are unaffected
  // (their handler runs; this is just a backstop for un-JS'd forms).
  document.addEventListener('submit',function(e){
    var form=e.target;if(!form||form.tagName!=='FORM')return;
    var action=form.getAttribute('action')||'';
    if(/^[a-z][a-z0-9+.-]*:\/\//i.test(action)) return;          // absolute http(s):// → allow native POST
    e.preventDefault();                                           // else would navigate the iframe to the parent app
  },true);
})();</script></body></html>
